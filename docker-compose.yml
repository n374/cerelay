# ============================================================
# Cerelay Server — docker-compose 配置
# 使用方式：
#   1. 默认复用当前 shell / Claude Code 注入的环境变量
#   2. docker compose up -d
# ============================================================

services:
  cerelay-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cerelay-server:latest

    # 环境变量（通过 .env 文件或 -e 参数传入）
    environment:
      # 优先复用当前 shell / Claude Code 注入的环境变量
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL-}
      # 可选：覆盖端口（容器内端口，与 ports 映射对应）
      - PORT=${SERVER_PORT:-8765}
      # 可选：覆盖模型
      - MODEL=${MODEL:-claude-sonnet-4-20250514}
      # 可选：覆盖日志级别（debug/info/warn/error）
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # 可选：是否输出 JSON Lines 日志
      - LOG_JSON=${LOG_JSON:-false}
      # 可选：显式指定 Claude Code 可执行文件路径
      - CLAUDE_CODE_EXECUTABLE=${CLAUDE_CODE_EXECUTABLE:-/usr/local/bin/claude}
      # 可选：传入 claude CLI 额外配置（JSON 字符串）
      - CLAUDE_CONFIG=${CLAUDE_CONFIG-}
      # 可选：Client 连接共享密钥（未设置则不校验）
      - CERELAY_KEY=${CERELAY_KEY-}
      # Claude session 运行在独立 mount namespace 中
      - CERELAY_ENABLE_MOUNT_NAMESPACE=${CERELAY_ENABLE_MOUNT_NAMESPACE:-true}
      - CERELAY_NAMESPACE_RUNTIME_ROOT=${CERELAY_NAMESPACE_RUNTIME_ROOT:-/opt/cerelay-runtime}
      # 可选：容器级透明 SOCKS5 代理（fail-closed）
      - CERELAY_SOCKS_PROXY=${CERELAY_SOCKS_PROXY-}
      - CERELAY_SOCKS_UDP=${CERELAY_SOCKS_UDP:-forward}
      - CERELAY_SOCKS_DNS_SERVER=${CERELAY_SOCKS_DNS_SERVER:-1.1.1.1}
      - CERELAY_SOCKS_TUN_ADDRESS=${CERELAY_SOCKS_TUN_ADDRESS:-172.19.0.1/30}
      - CERELAY_SOCKS_TUN_MTU=${CERELAY_SOCKS_TUN_MTU:-9000}
      # 容器持久化数据目录：凭证、Client 缓存、shadow MCP unix socket 均存放于此
      - CERELAY_DATA_DIR=${CERELAY_DATA_DIR:-/var/lib/cerelay}
      # Plan D shadow MCP tools 总开关（默认 true）。设为 false/0/no/off 可
      # 回退到 legacy PreToolUse hook 路径（is_error 协议硬约束 = true）。
      # 详见 docs/plan-d-mcp-shadow-tools.md 与 CLAUDE.md "Shadow MCP Tools" 章节。
      - CERELAY_ENABLE_SHADOW_MCP=${CERELAY_ENABLE_SHADOW_MCP:-true}

    # 端口映射：宿主机端口 → 容器内端口
    ports:
      - "${SERVER_HOST_PORT:-8765}:${SERVER_PORT:-8765}"

    # 容器持久化数据：Claude Code 登录凭证、Client 文件缓存
    # 首次启动 credentials 为空，用户通过 Client 发起 `claude login` 之后产生的凭证
    # 由 FUSE shadow file 落到 /var/lib/cerelay/credentials/default/.credentials.json 并持久化
    volumes:
      - type: volume
        source: cerelay-data
        target: /var/lib/cerelay

    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

    # 放行 seccomp/AppArmor：默认 profile 在部分内核版本下会间歇性阻断 FUSE mount 系统调用
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

    # FUSE 设备：供 Client 侧文件代理使用
    devices:
      - /dev/fuse:/dev/fuse
      - /dev/net/tun:/dev/net/tun

    # 健康检查（覆盖 Dockerfile 中的定义，可按需调整）
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const port=Number(process.env.PORT||8765);const req=http.get({host:'127.0.0.1',port,path:'/health',timeout:4000},res=>{res.resume();process.exit(res.statusCode===200?0:1);});req.on('error',()=>process.exit(1));req.on('timeout',()=>{req.destroy();process.exit(1);});"
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    # 重启策略：除非手动停止，否则自动重启
    restart: unless-stopped

    # 日志配置：限制日志文件大小
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  cerelay-data:
    driver: local
