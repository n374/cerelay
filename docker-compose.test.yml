# ============================================================
# Cerelay — 容器化测试编排
# 使用方式：
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   或通过 npm: npm run test:container
# ============================================================

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test

    # Mount namespace 测试需要 SYS_ADMIN 能力
    cap_add:
      - SYS_ADMIN

    # 放行 seccomp/AppArmor，与生产容器保持一致
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined

    # FUSE 设备
    devices:
      - /dev/fuse:/dev/fuse

    environment:
      - NODE_ENV=test
      - CERELAY_TEST_IN_CONTAINER=true
      - CERELAY_EXPECT_MOUNT_NAMESPACE_TESTS=false
      - CERELAY_ENABLE_MOUNT_NAMESPACE=false
      - CERELAY_NAMESPACE_RUNTIME_ROOT=/opt/cerelay-runtime
      - CERELAY_RUN_CONTAINER_SOCKS_TESTS=true
      - CERELAY_SOCKS_TEST_BASE_URL=http://cerelay-socks-test:8765
      - CERELAY_SOCKS_TEST_WS_URL=ws://cerelay-socks-test:8765/ws
      - MOCK_SOCKS_ADMIN_URL=http://mock-socks:18080
      - MOCK_DNS_HOST=mock-dns
      - EGRESS_PROBE_HOST=egress-probe
      # E2E mock-api 测试用的 claude 可执行文件
      - CLAUDE_CODE_EXECUTABLE=/usr/local/bin/claude

    depends_on:
      - mock-socks
      - mock-dns
      - egress-probe
      - cerelay-socks-test

    # 临时文件系统：测试产物不持久化
    tmpfs:
      - /tmp:exec,size=512M

    networks:
      - cerelay-testnet

    # 不自动重启——跑完就退出
    restart: "no"

  mock-socks:
    image: node:22-slim
    working_dir: /fixtures
    command: ["node", "/fixtures/mock-socks.mjs"]
    environment:
      - MOCK_SOCKS_CONNECT_MAP=203.0.113.10:8080=egress-probe:8080
    volumes:
      - ./test/container-fixtures:/fixtures:ro
    networks:
      - cerelay-testnet
    restart: "no"

  mock-dns:
    image: node:22-slim
    working_dir: /fixtures
    command: ["node", "/fixtures/mock-dns.mjs"]
    environment:
      - MOCK_DNS_A_RECORD=203.0.113.10
      - MOCK_DNS_NAME_SUFFIX=.test
    volumes:
      - ./test/container-fixtures:/fixtures:ro
    networks:
      - cerelay-testnet
    restart: "no"

  egress-probe:
    image: node:22-slim
    working_dir: /fixtures
    command: ["node", "/fixtures/egress-probe.mjs"]
    environment:
      - EGRESS_PROBE_BODY=pong from egress-probe
    volumes:
      - ./test/container-fixtures:/fixtures:ro
    networks:
      - cerelay-testnet
    restart: "no"

  cerelay-socks-test:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/test-entrypoint-socks-test.sh"]
    depends_on:
      - mock-socks
      - mock-dns
      - egress-probe
    environment:
      - ANTHROPIC_API_KEY=test-key
      - PORT=8765
      - CERELAY_ENABLE_MOUNT_NAMESPACE=false
      - CERELAY_SOCKS_PROXY=socks5://mock-socks:1080
      - CERELAY_SOCKS_DNS_SERVER=mock-dns
      - CERELAY_SOCKS_UDP=block
      - 'CERELAY_PTY_COMMAND=curl -fsS "http://echo-$(date +%s%N).test:8080/ping"'
      - CLAUDE_CODE_EXECUTABLE=/usr/local/bin/claude
    cap_add:
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./docker/test-entrypoint-socks-test.sh:/usr/local/bin/test-entrypoint-socks-test.sh:ro
    tmpfs:
      - /tmp:exec,size=512M
    networks:
      - cerelay-testnet
    restart: "no"

networks:
  cerelay-testnet:
    driver: bridge
